name: Org Admin Agent

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly Monday 9am UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  org-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: "true"
          github_token: ${{ secrets.ORG_AUDIT_TOKEN }}
          prompt: |
            You are the org admin agent for the postman-cs GitHub organization.

            Use the GitHub CLI (gh) to list all repositories in the postman-cs org and audit each one against these rules:

            ## 1. Naming Convention
            All repo names must match: ^(cust|postman|proj|personal)-[a-z0-9]+(-[a-z0-9]+)*$
            - cust-* for customer-specific engagements
            - postman-* for external-facing tools and actions
            - proj-* for internal projects
            - personal-* for personal repos/explorations
            - All lowercase, no underscores, no trailing/double hyphens

            ## 2. Repository Description
            Every repo must have a non-empty, professional description. Flag repos with:
            - Empty descriptions
            - Placeholder descriptions like "project", "test", or single words
            - Descriptions containing personal names without context

            ## 3. README Quality
            Check if each repo has a README.md. Flag repos missing one entirely.

            ## 4. Visibility Audit
            Flag any PUBLIC repo that:
            - Contains customer names in the repo name or description
            - Has "internal" or "cust" in the name but is public
            - Exposes internal tooling or methodology

            ## 5. Staleness
            Flag repos with no commits in the last 6 months as candidates for archival.

            ## Actions
            For each violation found:
            - Open a GitHub issue on the repo with the label "org-audit"
            - Include the specific violation, the rule it breaks, and a suggested fix
            - Do NOT open duplicate issues -- check for existing open issues with the "org-audit" label first
            - Be professional and helpful in issue descriptions

            At the end, output a summary table of all violations found.
          claude_args: "--model us.anthropic.claude-sonnet-4-6-v1:0 --max-turns 100"
        env:
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.BEDROCK_API_KEY }}
          AWS_REGION: us-east-1
